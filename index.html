<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Weinbestand</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f0ece6;
    --border: #e0d8ce;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --gold-dim: rgba(184,134,11,0.1);
    --text: #1a1410;
    --text-muted: #6b5f52;
    --text-dim: #a89880;
    --red-wine: #8b1a2e;
    --accent: #b8860b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    padding: 52px 24px 24px;
    border-bottom: 2px solid var(--border);
    background: var(--surface);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    flex: 1;
    padding: 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }

  .tab.active { color: var(--gold); }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ADD FORM */
  .form-panel { padding: 28px 20px; background: var(--bg); }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="url"],
  input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 14px 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }

  input::placeholder { color: var(--text-dim); }

  .btn-add {
    width: 100%;
    padding: 16px;
    background: var(--red-wine);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }

  .btn-add:active { transform: scale(0.98); background: #6a1422; }

  .status-msg {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 12px;
    display: none;
  }

  .status-msg.success {
    display: block;
    background: #f0f7f0;
    border: 1px solid #b0d4b0;
    color: #2d6b2d;
  }

  .status-msg.error {
    display: block;
    background: #fdf0f0;
    border: 1px solid #e0b0b0;
    color: #8b2020;
  }

  .status-msg.loading {
    display: block;
    background: var(--gold-dim);
    border: 1px solid rgba(184,134,11,0.3);
    color: var(--gold);
  }

  /* BESTAND */
  .list-panel { padding: 0; background: var(--bg); }

  .list-header {
    padding: 20px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .list-count {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .btn-refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-refresh:hover { border-color: var(--gold); color: var(--gold); }

  .wine-card {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px;
    position: relative;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wine-card::before {
    content: '';
    position: absolute;
    left: 0; top: 15%; bottom: 15%;
    width: 3px;
    background: var(--red-wine);
  }

  .wine-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.2;
    padding-left: 16px;
  }

  .wine-origin {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding-left: 16px;
    margin-bottom: 14px;
  }

  .wine-meta {
    padding-left: 16px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 14px;
  }

  .wine-meta-row {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .wine-meta-row span {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 8px;
  }

  .wine-footer {
    padding-left: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .wine-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
  }

  .wine-link {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px solid var(--gold-dim);
    padding-bottom: 1px;
    transition: border-color 0.2s;
    display: inline-block;
    margin-top: 4px;
  }

  .wine-link:hover { border-color: var(--gold); }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
  }

  .qty-btn {
    background: none;
    border: none;
    color: var(--red-wine);
    font-size: 18px;
    cursor: pointer;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    transition: background 0.15s;
  }

  .qty-btn:active { background: var(--gold-dim); }

  .qty-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--text);
    min-width: 24px;
    text-align: center;
  }

  .qty-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .empty-state {
    padding: 60px 24px;
    text-align: center;
    background: var(--surface);
  }

  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Privater Keller</div>
  <h1>Wein<em>bestand</em></h1>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('bestand')">Bestand</button>
  <button class="tab" onclick="showTab('add')">+ Hinzufügen</button>
</div>

<!-- BESTAND -->
<div id="panel-bestand" class="panel list-panel active">
  <div class="list-header">
    <span class="list-count" id="wine-count">— Flaschen</span>
    <button class="btn-refresh" onclick="loadWines()">↻ Laden</button>
  </div>
  <div id="wine-list"></div>
</div>

<!-- HINZUFÜGEN -->
<div id="panel-add" class="panel form-panel">
  

  <div class="field">
    <label>Shop-Link (gute-weine.de)</label>
    <input type="url" id="input-url" placeholder="https://www.gute-weine.de/produkt/..." autocomplete="off" autocorrect="off" autocapitalize="off">
  </div>

  <div class="field">
    <label>Stückzahl</label>
    <input type="number" id="input-qty" placeholder="1" min="1" value="1">
  </div>

  <button class="btn-add" onclick="addWine()">Wein anlegen</button>
  <div class="status-msg" id="status-msg"></div>
</div>

<script>
  // ============================================================
  // KONFIGURATION – hier deine n8n URLs eintragen
  // ============================================================
  const N8N_WEBHOOK_ADD  = 'https://wisemen.app.n8n.cloud/webhook/weinbestand-add';
  const N8N_WEBHOOK_LIST = 'https://wisemen.app.n8n.cloud/webhook/weinbestand-list';
  const N8N_WEBHOOK_QTY  = 'https://wisemen.app.n8n.cloud/webhook/weinbestand-qty';
  const N8N_WEBHOOK_DEL  = 'https://wisemen.app.n8n.cloud/webhook/weinbestand-delete';
  const N8N_WEBHOOK_FAV  = 'https://wisemen.app.n8n.cloud/webhook/weinbestand-favorit';
  // ============================================================

  // Lokaler Demo-Speicher bis n8n verbunden ist
  let localWines = JSON.parse(localStorage.getItem('weinbestand') || '[]');

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['bestand','add'][i] === tab));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'bestand') loadWines();
  }

  async function addWine() {
    const url = document.getElementById('input-url').value.trim();
    const qty = parseInt(document.getElementById('input-qty').value) || 1;
    const msg = document.getElementById('status-msg');

    if (!url || !url.includes('gute-weine.de')) {
      showStatus('Bitte einen gültigen gute-weine.de Link eingeben.', 'error');
      return;
    }

    showStatus('Wein wird gescrapt…', 'loading');

    // Wenn n8n noch nicht konfiguriert → Demo-Modus
    if (N8N_WEBHOOK_ADD === 'DEINE_N8N_WEBHOOK_URL_HIER') {
      await new Promise(r => setTimeout(r, 1500)); // simuliere Latenz
      const demo = {
        id: Date.now(),
        name: 'Opus One: Opus One 2014',
        herkunft: 'USA, Californien, Napa Valley',
        rebsorten: 'Cabernet Sauvignon 80%, Petit Verdot 7%, Cabernet Franc 6%, Merlot 5%, Malbec 2%',
        eigenschaften: 'rot, trocken · Gereift · 14,5% Vol. · Trinkreife: 2024–2055',
        geschmack: 'voluminös & kräftig · tanninreich · seidig & aromatisch',
        preis: '499,00 €',
        url: url,
        stueckzahl: qty
      };
      localWines.unshift(demo);
      localStorage.setItem('weinbestand', JSON.stringify(localWines));
      showStatus('✓ Wein angelegt (Demo-Modus – n8n noch nicht verbunden)', 'success');
      document.getElementById('input-url').value = '';
      document.getElementById('input-qty').value = '1';
      return;
    }

    try {
      const res = await fetch(N8N_WEBHOOK_ADD, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': 'wein-geheim-2026' },
        body: JSON.stringify({ url, stueckzahl: qty })
      });
      if (!res.ok) throw new Error('Fehler ' + res.status);
      showStatus('✓ Wein erfolgreich angelegt!', 'success');
      document.getElementById('input-url').value = '';
      document.getElementById('input-qty').value = '1';
    } catch(e) {
      showStatus('Fehler: ' + e.message, 'error');
    }
  }

  async function loadWines() {
    const list = document.getElementById('wine-list');
    list.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-dim);font-size:12px;letter-spacing:0.1em;">Lade Bestand…</div>';

    // Demo-Modus
    if (N8N_WEBHOOK_LIST === 'DEINE_N8N_WEBHOOK_URL_LISTE') {
      renderWines(localWines);
      return;
    }

    try {
      const res = await fetch(N8N_WEBHOOK_LIST, { headers: { 'x-api-key': 'wein-geheim-2026' } });
      const data = await res.json();
      renderWines(Array.isArray(data) ? data : data.wines || []);
    } catch(e) {
      list.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#c97a7a;font-size:12px;">Fehler beim Laden. n8n erreichbar?</div>';
    }
  }

  function renderWines(wines) {
    const list = document.getElementById('wine-list');
    document.getElementById('wine-count').textContent = wines.length + (wines.length === 1 ? ' Flasche' : ' Flaschen');

    if (!wines.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🍷</div><p>Noch kein Wein im Keller.</p></div>`;
      return;
    }

    list.innerHTML = wines.map((w, i) => `
      <div class="wine-card" id="card-${w.id || i}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="wine-name" style="padding-left:16px">${w.name || '–'}</div>
          <button id="fav-${w.id || i}" onclick="toggleFavorit('${w.id || i}', ${w.favorit ? 'true' : 'false'})" style="background:none;border:none;font-size:22px;cursor:pointer;color:${w.favorit ? '#b8860b' : 'var(--text-dim)'};padding:0 4px;line-height:1;">${w.favorit ? '★' : '☆'}</button>
        </div>
        <div class="wine-origin">${w.herkunft || ''}</div>
        <div class="wine-meta">
          ${w.rebsorten ? `<div class="wine-meta-row"><span>Rebsorte</span>${w.rebsorten}</div>` : ''}
          ${w.farbe_geschmack ? `<div class="wine-meta-row"><span>Stil</span>${w.farbe_geschmack}</div>` : ''}
          ${w.alkohol ? `<div class="wine-meta-row"><span>Alkohol</span>${w.alkohol}</div>` : ''}
          ${w.jahrgang ? `<div class="wine-meta-row"><span>Jahrgang</span>${w.jahrgang}</div>` : ''}
          ${w.trinkreife ? `<div class="wine-meta-row"><span>Trinkreife</span>${w.trinkreife}</div>` : ''}
          ${w.geschmack ? `<div class="wine-meta-row"><span>Charakter</span>${w.geschmack}</div>` : ''}
          ${w.bewertung ? `<div class="wine-meta-row"><span>Bewertung</span>${w.bewertung}</div>` : ''}
        </div>
        <div class="wine-footer">
          <div>
            <div class="wine-price">${w.preis || '–'}</div>
            ${w.url ? `<a href="${w.url}" target="_blank" class="wine-link">Shop ↗</a>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">

            <div class="qty-label">Stückzahl</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty('${w.id || i}', Math.max(0, parseInt(document.getElementById('qty-${w.id || i}').textContent)-1))">−</button>
              <div class="qty-value" id="qty-${w.id || i}">${w.stueckzahl || 1}</div>
              <button class="qty-btn" onclick="changeQty('${w.id || i}', parseInt(document.getElementById('qty-${w.id || i}').textContent)+1)">+</button>
            </div>
            <button onclick="deleteWine('${w.id || i}')" style="background:none;border:none;color:var(--text-dim);font-size:11px;letter-spacing:0.1em;cursor:pointer;text-transform:uppercase;font-family:'DM Mono',monospace;margin-top:4px;" onmouseover="this.style.color='#c97a7a'" onmouseout="this.style.color='var(--text-dim)'">✕ Löschen</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function changeQty(id, newQty) {
    if (newQty < 0) return;  // Stückzahl minimum 0
    document.getElementById('qty-' + id).textContent = newQty;

    // Demo-Modus
    if (N8N_WEBHOOK_QTY === 'DEINE_N8N_WEBHOOK_URL_QTY') {
      const w = localWines.find(w => String(w.id) === String(id));
      if (w) { w.stueckzahl = newQty; localStorage.setItem('weinbestand', JSON.stringify(localWines)); }
      return;
    }

    // Fire and forget – nicht auf Antwort warten
    fetch(N8N_WEBHOOK_QTY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'wein-geheim-2026' },
      body: JSON.stringify({ id, stueckzahl: newQty })
    }).catch(e => console.error('Qty update failed', e));
  }

  async function deleteWine(id) {
    if (!confirm('Wein wirklich löschen?')) return;
    try {
      await fetch(N8N_WEBHOOK_DEL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': 'wein-geheim-2026' },
        body: JSON.stringify({ id })
      });
      // Karte aus DOM entfernen
      document.getElementById('card-' + id)?.remove();
      // Zähler aktualisieren
      const count = document.querySelectorAll('.wine-card').length;
      document.getElementById('wine-count').textContent = count + (count === 1 ? ' Flasche' : ' Flaschen');
    } catch(e) { alert('Fehler beim Löschen.'); }
  }

  function toggleFavorit(id, current) {
    const isFav = !current;
    const btn = document.getElementById('fav-' + id);
    btn.textContent = isFav ? '★' : '☆';
    btn.style.color = isFav ? '#b8860b' : 'var(--text-dim)';
    fetch(N8N_WEBHOOK_FAV, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'wein-geheim-2026' },
      body: JSON.stringify({ id, favorit: isFav })
    }).catch(e => console.error('Favorit update failed', e));
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
  }



  // Initial laden
  loadWines();
</script>
</body>
</html>
